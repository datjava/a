<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Rules Checklist</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #2d3553;
      --title: #2e4fc7;
      --muted: #7d86a8;
      --line: #dfe5f2;
      --accent: #4b6df0;
      --radius: 6px;
      --shadow: 0 4px 14px rgba(73, 91, 150, 0.08);

      --aqua-bg: #eef6ff;
      --aqua-line: #d8e8ff;
      --aqua-text: #2e63c7;

      --teal-bg: #eaf9f8;
      --teal-line: #cceeed;
      --teal-text: #168b88;

      --yellow-bg: #fff8df;
      --yellow-line: #f4e5a8;
      --yellow-text: #a97800;

      --green-bg: #edf8ed;
      --green-line: #d2ebd2;
      --green-text: #2e8b45;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Inter, Arial, sans-serif;
    }

    .page {
      width: min(900px, calc(100% - 24px));
      margin: 0 auto;
      padding: 22px 0 40px;
    }

    .hero {
      background: var(--aqua-bg);
      border: 1px solid var(--aqua-line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      color: var(--aqua-text);
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.1;
      letter-spacing: 0.04em;
      font-weight: 800;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
    }

    .status-box {
      min-width: 118px;
      background: var(--card);
      border: 1px solid var(--aqua-line);
      border-radius: var(--radius);
      padding: 12px 14px;
      text-align: right;
    }

    .status-box .small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .status-box .big {
      color: var(--aqua-text);
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
    }

    .progress-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .progress {
      height: 10px;
      border-radius: 4px;
      background: #e7ecfb;
      border: 1px solid var(--aqua-line);
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--aqua-text);
      transition: width 0.25s ease;
    }

    .progress-text {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .board {
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .panel-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--aqua-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .panel[data-color="aqua"] h2 { color: var(--aqua-text); }
    .panel[data-color="teal"] h2 { color: var(--teal-text); }
    .panel[data-color="yellow"] h2 { color: var(--yellow-text); }
    .panel[data-color="green"] h2 { color: var(--green-text); }

    .color-picker {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .color-btn {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid rgba(80, 90, 120, 0.2);
      cursor: pointer;
      padding: 0;
      background: white;
    }

    .color-btn[data-color="aqua"] { background: var(--aqua-bg); }
    .color-btn[data-color="teal"] { background: var(--teal-bg); }
    .color-btn[data-color="yellow"] { background: var(--yellow-bg); }
    .color-btn[data-color="green"] { background: var(--green-bg); }

    .color-btn.active {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    .color-btn[data-color="aqua"].active { color: var(--aqua-text); }
    .color-btn[data-color="teal"].active { color: var(--teal-text); }
    .color-btn[data-color="yellow"].active { color: var(--yellow-text); }
    .color-btn[data-color="green"].active { color: var(--green-text); }

    .item {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      padding: 16px 18px;
      border-top: 1px solid var(--line);
      background: var(--card);
      cursor: pointer;
      user-select: none;
    }

    .item:hover { background: #f7f9ff; }
    .item:first-of-type { border-top: 0; }

    .check {
      width: 21px;
      height: 21px;
      border-radius: 4px;
      border: 2px solid #cfd8fb;
      background: #ffffff;
      display: grid;
      place-items: center;
      color: white;
      font-size: 13px;
      font-weight: 900;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .item.done .check {
      background: var(--aqua-text);
      border-color: var(--aqua-text);
    }

    .rule {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
    }

    .rule b {
      color: var(--title);
      font-weight: 800;
    }

    .note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .item.done .rule {
      color: #8991aa;
      text-decoration: line-through;
      text-decoration-thickness: 1.5px;
      text-decoration-color: #b7bfdc;
    }

    .item.done .note { color: #9da5bb; }

    @media (max-width: 640px) {
      .page {
        width: 100%;
        padding: 10px 0 28px;
      }

      .hero {
        margin: 0 10px 14px;
        padding: 15px;
      }

      .hero-top {
        flex-direction: column;
        gap: 12px;
      }

      .status-box {
        width: 100%;
        text-align: left;
      }

      .panel {
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .panel-head {
        padding: 14px 16px;
        align-items: flex-start;
        flex-direction: column;
      }

      .color-picker { gap: 8px; }
      .color-btn { width: 24px; height: 24px; }

      .item {
        padding: 14px 16px;
        grid-template-columns: 26px minmax(0, 1fr);
        gap: 10px;
      }

      .rule { font-size: 14px; }
      .note { font-size: 12.5px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>Habit Rules</h1>
          <div class="sub">Checklist tối giản · mặc định xanh nước · chọn màu cho từng thanh</div>
        </div>

        <div class="status-box">
          <div class="small">Tiến độ</div>
          <div class="big" id="percentText">0%</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        <div class="progress-text" id="countText">0/0 đã tick</div>
      </div>
    </section>

    <section class="board" id="board"></section>
  </main>

  <script>
    const STORAGE_KEY = "habit_rules_minimal_color_bars_v2";
    const COLORS = ["aqua", "teal", "yellow", "green"];

    const groups = [
      {
        title: "Hệ thống quy tắc thói quen",
        items: [
          { text: "Sau khi dậy lúc 6h50, tôi sẽ <b>nấu cơm cho buổi trưa</b>.", note: "Khi làm xong, tôi được uống nước cam hoặc nghe 1 bài nhạc trước khi học ngoại ngữ." },
          { text: "Sau khi nấu cơm cho buổi trưa, tôi sẽ <b>học ngoại ngữ 1 tiếng</b>.", note: "Khi làm xong, tôi được nghỉ 5–10 phút, uống nước cam, hoặc nghe nhạc khi thay đồ / đi đường." },
          { text: "Sau khi học ngoại ngữ 1 tiếng, tôi sẽ <b>thay quần áo</b>.", note: "Khi làm xong, tôi được ra ngoài nếu thời tiết ổn; nếu trời nóng, tôi ngồi vào bàn học/làm ở nhà." },
          { text: "Sau khi ra ngoài hoặc ngồi vào bàn học/làm, tôi sẽ <b>học bài tự làm</b>.", note: "Khi làm xong ít nhất 25 phút, tôi được dùng AI hỗ trợ gợi ý hướng đi. AI không làm hộ ngay." },
          { text: "Sau khi học/làm 45 phút, tôi sẽ <b>nghỉ 5–10 phút bằng đi lại, rửa mặt, uống nước hoặc làm việc nhà</b>.", note: "Khi nghỉ xong, tôi quay lại làm tiếp 1 phiên nhỏ 10–25 phút." },
          { text: "Sau khi ăn trưa, tôi sẽ <b>nghỉ nhẹ</b>.", note: "Tôi được đi lại, uống nước, nằm nghỉ ngắn không điện thoại. Tôi không mở Shorts/feed sau ăn trưa." },
          { text: "Sau khi đi học/làm về, tôi sẽ <b>nấu cơm tối</b>.", note: "Khi làm xong, tôi được ăn tử tế và nghe nhạc nếu muốn." },
          { text: "Sau khi ăn tối, tôi sẽ <b>dọn bếp / rửa bát</b>.", note: "Khi làm xong, tôi được nghỉ 10 phút trước khi làm lab." },
          { text: "Sau khi dọn bếp, tôi sẽ <b>làm lab 45 phút</b>.", note: "Khi làm xong, tôi được đọc sách 10–20 phút hoặc nghỉ nhẹ 5 phút." },
          { text: "Sau khi làm lab, tôi sẽ <b>đọc sách</b>.", note: "Khi làm xong, tôi được gọi/nhắn bố mẹ nếu tiện." },
          { text: "Sau khi gọi/nhắn bố mẹ, tôi sẽ <b>reset cuối ngày</b>.", note: "Reset gồm: tick checklist, dọn bàn 2 phút, chuẩn bị đồ/ngày mai." },
          { text: "Sau khi làm xong việc chính và reset cuối ngày, tôi được <b>thưởng giải trí có giới hạn</b>.", note: "Chọn 1: xem Oggy 1 tập, đọc truyện tranh 10–15 phút, hoặc xem phim ngôn tình 20–30 phút." }
        ]
      },
      {
        title: "Luật cắt cơn & phản xạ",
        items: [
          { text: "Khi thèm mở mạng xã hội như Facebook / Instagram / Threads / YouTube Shorts, tôi sẽ <b>tắt máy hoặc đóng app ngay lập tức</b>.", note: "Khi đóng được app, tôi được tick 1 điểm tự chủ và quay lại làm việc trong không gian tập trung." },
          { text: "Khi muốn mở mạng xã hội, tôi sẽ <b>hỏi: “Tôi vào để làm gì?”</b>.", note: "Nếu không trả lời được mục đích rõ ràng, tôi không mở." },
          { text: "Khi bí đầu, tôi sẽ <b>làm việc nhà 5 phút</b>.", note: "Rửa bát, lau bàn, quét phòng, gấp quần áo, đổ rác hoặc dọn giường. Xong thì uống nước/rửa mặt/nghỉ 2 phút rồi quay lại làm 5–10 phút việc chính." },
          { text: "Khi thèm xem sex / thủ dâm lúc gặp bài khó, tôi sẽ <b>đứng dậy rời bàn học, rửa mặt nước lạnh và làm việc nhà 5 phút</b>.", note: "Khi làm xong, tôi được nạp lại năng lượng bằng uống nước/nước cam/nghỉ 2 phút, rồi quay lại xử lý lab hoặc bài tập thêm 5 phút." },
          { text: "Khi muốn ăn vặt trong lúc học, tôi sẽ <b>uống nước trước và làm tiếp 10 phút</b>.", note: "Sau đó mới quyết định có ăn hay không. Ăn vặt không được đặt trên bàn học." },
          { text: "Khi muốn nghe nhạc trong lúc học/làm lab/đọc sách, tôi sẽ <b>đổi sang im lặng, tiếng mưa hoặc white noise</b>.", note: "Tôi chỉ nghe nhạc khi nấu cơm, dọn phòng, rửa bát, đi đường hoặc tắm." }
        ]
      },
      {
        title: "Luật thưởng",
        items: [
          { text: "Phần thưởng hợp lệ: <b>uống nước cam, nghe 1 bài nhạc, nghỉ 5–10 phút, Oggy 1 tập, truyện tranh 10–15 phút, phim ngôn tình 20–30 phút, gọi/nhắn bố mẹ, tick checklist</b>.", note: "Phần thưởng phải có điểm dừng rõ." },
          { text: "Phần thưởng không hợp lệ: <b>xem sex/porn, thủ dâm, lướt Facebook/Instagram/Threads, YouTube Shorts, lướt feed vô thức, dùng AI làm hộ bài ngay từ đầu</b>.", note: "Mấy thứ này không dùng làm thưởng vì dễ phá cả ngày." },
          { text: "Nếu hôm đó là ngày trầm / mệt / nóng / không có sức, tôi chỉ cần làm <b>bản tối thiểu</b>.", note: "Dậy khỏi giường, rửa mặt, làm 1 việc nhà 5 phút, ăn một bữa tử tế, học/lab 10 phút, không xem sex trước khi học, không mở Shorts/feed trước 21h." }
        ]
      }
    ];

    let state = loadState();

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved || !saved.done) throw new Error("empty");
        return {
          done: saved.done || {},
          colors: saved.colors || {}
        };
      } catch {
        return { done: {}, colors: {} };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function flatItems() {
      return groups.flatMap((group, gi) => group.items.map((item, ii) => ({ ...item, id: `${gi}-${ii}` })));
    }

    function colorPicker(groupIndex, activeColor) {
      return `
        <div class="color-picker" aria-label="Chọn màu thanh">
          ${COLORS.map(color => `
            <button
              class="color-btn ${activeColor === color ? "active" : ""}"
              data-group-color="${groupIndex}"
              data-color="${color}"
              title="${color}"
              aria-label="Chọn màu ${color}"
            ></button>
          `).join("")}
        </div>
      `;
    }

    function render() {
      const board = document.getElementById("board");
      board.innerHTML = groups.map((group, gi) => {
        const color = state.colors[gi] || "aqua";
        return `
          <section class="panel" data-color="${color}">
            <div class="panel-head">
              <h2>${group.title}</h2>
              ${colorPicker(gi, color)}
            </div>
            ${group.items.map((item, ii) => {
              const id = `${gi}-${ii}`;
              const done = !!state.done[id];
              return `
                <div class="item ${done ? "done" : ""}" data-id="${id}">
                  <div class="check">${done ? "✓" : ""}</div>
                  <div>
                    <div class="rule">${item.text}</div>
                    <div class="note">${item.note}</div>
                  </div>
                </div>
              `;
            }).join("")}
          </section>
        `;
      }).join("");

      document.querySelectorAll(".item").forEach(el => {
        el.addEventListener("click", () => {
          const id = el.dataset.id;
          state.done[id] = !state.done[id];
          saveState();
          render();
        });
      });

      document.querySelectorAll("[data-group-color]").forEach(btn => {
        btn.addEventListener("click", event => {
          event.stopPropagation();
          const groupIndex = btn.dataset.groupColor;
          const color = btn.dataset.color;
          state.colors[groupIndex] = color;
          saveState();
          render();
        });
      });

      renderProgress();
    }

    function renderProgress() {
      const all = flatItems();
      const done = all.filter(item => state.done[item.id]).length;
      const total = all.length;
      const percent = total ? Math.round(done / total * 100) : 0;
      document.getElementById("countText").textContent = `${done}/${total} đã tick`;
      document.getElementById("percentText").textContent = `${percent}%`;
      document.getElementById("progressBar").style.width = `${percent}%`;
    }

    render();
  </script>
</body>
</html>
